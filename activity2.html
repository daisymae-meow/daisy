<!DOCTYPE html>
<html>
<head>
<title>Registration</title>
    <style>
	body{
    font-family: Arial;
    background-attachment: fixed;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
	}

	.box{
    width:450px;
    background:#F6FC8D;
    padding:30px;
    border-radius:15px;
    box-shadow:0 6px 15px rgba(0,0,0,0.3);
	}

	input, select{
    width:65%;
    padding:8px;
    margin:5px 0;
	}
	input[type="radio"]{
    width: auto;
    margin-right: 5px;
	}

	.gender{
    margin-right: 20px;
	}
	
	input[type="checkbox"]{
    width: auto;
    margin-right: 8px;
	}

	button{
    padding:10px;
    width:48%;
    background-color:#D99D54;
    border:none;
    border-radius:8px;
    cursor:pointer;
	}

	button:hover{
    background-color:pink;
	}

	.success{
    color:green;
    display:none;
	}
</style>

</style>
</head>
    <body>
        <div class=" box">
    <h2>Registration Form</h2>

    <form id="form">
      <b> Full Name:</b><br><input type="text" id = "name" required><br><br>

      <b> Email:</b><br><input type="email" id = "email" required><br><br>

      <b> Password:</b><br><input type="password" id = "pass" required><br><br>

      <b> Confirm Password:</b><br><input type="password" id = "cpass" onkeyup="checkPass()"><br><p id="msg"></p>

      <b> Age:</b><br><input type="number" id = "age"><br><br>

      <b>Gender:</b><br>

	  <label class="gender">
      <input type="radio" name="g" value="Male"> Male
      </label>

      <label class="gender">
      <input type="radio" name="g" value="Female"> Female
      </label>

      <label class="gender">
      <input type="radio" name="g" value="Other"> Other
      </label> <br><br>

      <b> Country:</b><br><select id="country"><option>Philippines</option><option>United State America</option><option>China</option></select><br><br>
     <input type="checkbox" id="terms"> I agree <br><br>
	 
	 <button type="submit">Register</button>
	 <button type="reset">Clear</button>

     <p class="success" id="ok">Registration successful!</p>
	 
	 <script>
	 let pass = document.getElementById("pass");
	 let cpass = document.getElementById("cpass");
	 let msg = document.getElementById("msg");

cpass.oninput = function() {
    if (pass.value === cpass.value) {
        msg.innerHTML = "Passwords match";
        msg.style.color = "green";
    } else {
        msg.innerHTML = "Passwords not match";
        msg.style.color = "red";
    }
    };

	document.getElementById("form").onsubmit = function(e) {
    e.preventDefault();

    if (!document.getElementById("terms").checked) {
        alert("Agree to terms first");
        return;
    }

    if (pass.value !== cpass.value) {
        alert("Passwords do not match");
        return;
    }

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let age = document.getElementById("age").value;
    let gender = document.querySelector('input[name="g"]:checked').value;
    let country = document.getElementById("country").value;

    alert(
        "Name: " + name +
        "\nEmail: " + email +
        "\nAge: " + age +
        "\nGender: " + gender +
        "\nCountry: " + country
    );

    document.getElementById("ok").style.display = "block";
};
</script>

</form>
</div>

</body>
</html>
