<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>

body {
    margin: 0;
    font-family: "Times New Roman", Times, serif;
    background-image: url('background.jpg');
    background-size: cover;
}

/* NAVBAR */
.navbar {
    background: rgba(254, 235, 231, 0.7);
    backdrop-filter: blur(10px);
    padding: 15px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    position: sticky;
    top: 0;
    z-index: 1000;
}

.navbar a {
    text-decoration: none;
    color: black;
    font-weight: bold;
    margin: 0 25px;
    font-size: 28px;
    position: relative;
    transition: 0.3s ease;
}

.navbar a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 3px;
    left: 0;
    bottom: -5px;
    background: linear-gradient(90deg, #f7d2f7, #e4c7ed);
    transition: 0.3s ease;
    border-radius: 10px;
}

.navbar a:hover::after {
    width: 100%;
}

.header {
    text-align: center;
    margin-top: 20px;
}

.title-box {
    display: inline-block;
    background-color: #FEEBE7;
    border: 2px solid #E4C7ED;
    padding: 15px 40px;
    border-radius: 25px;
    font-size: 35px;
    font-weight: bold;
    color: black;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    transition: 0.3s ease;
}

/* TITLE HOVER */
.title-box:hover {
    transform: scale(1.05);
    background-color: #F7D2F7;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* DASHBOARD CONTAINER */
.dashboard {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 60px;
}

/* CARDS */
.card {
    width: 260px;
    height: 200px;
    background-color: #FEEBE7;
    border-radius: 20px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    text-align: center;
    padding: 25px;
    font-size: 24px;
    color: black;
    text-decoration: none;
    transition: 0.3s ease;
    border: 2px solid #E4C7ED;

    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* CARD HOVER */
.card:hover {
    transform: translateY(-10px) scale(1.05);
    background-color: #F7D2F7;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* BACK BUTTON */
.back {
    display: inline-block;
    margin-top: 50px;
    padding: 12px 25px;
    background-color: #FEEBE7;
    border: 2px solid #E4C7ED;
    border-radius: 25px;
    font-size: 20px;
    text-decoration: none;
    color: black;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    transition: 0.3s ease;
}

/* BACK HOVER */
.back:hover {
    background-color: #F7D2F7;
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

/* CENTER BACK BUTTON */
.back-container {
    text-align: center;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="Activities.html">Activities</a>
    <a href="Quizzes.html">Quizzes</a>
    <a href="Examinations.html">Examinations</a>
    <a href="MyPortfolio.html">Profile</a>
</div>

<!-- DASHBOARD TITLE -->
<div class="header">
    <div class="title-box">Dashboard</div>
</div>

<!-- DASHBOARD CARDS -->
<div class="dashboard">

    <a class="card" href="Activities.html">
        📚<br><br>
        Activities <br>
		2
    </a>

    <a class="card" href="Quizzes.html">
        📝<br><br>
        Quizzes <br>
		3
    </a>

    <a class="card" href="Examinations.html">
        🧠<br><br>
        Examinations
    </a>

</div>

<!-- BACK TO PROFILE -->
<div class="back-container">
    <a class="back" href="MyPortfolio.html">← Back to Profile</a>
</div>

</body>
</html>
