<!DOCTYPE html>
<html>
<head>
<title>My First JavaScript</title>
</head>
<body>

    <script>
        function greet(name){
            return "Hello"+name"!";
        }
        function add(a, b){
            return a+b;
        }
        function fullName(firstName, lastName){
            return firstName+" "+lastName;
        }
        let message = greet("Alice");
        let sum=add(5,18);
        console.log(message);
        console.log(greet("Bob"));
        console.log(sum);
        console.log(fullName("Daisy", "Nicor"));
    </script>    
</body>
</html>
