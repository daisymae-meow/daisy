<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Activities</title>

<style>

/* BODY */
body {
    margin: 0;
    font-family: "Times New Roman", Times, serif;
    background-image: url('background.jpg');
    background-size: cover;
}

/* NAVBAR */
.navbar {
    background: rgba(254, 235, 231, 0.7);
    backdrop-filter: blur(10px);
    padding: 15px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    position: sticky;
    top: 0;
    z-index: 1000;
}

.navbar a {
    text-decoration: none;
    color: black;
    font-weight: bold;
    margin: 0 25px;
    font-size: 28px;
    position: relative;
    transition: 0.3s ease;
}

.navbar a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 3px;
    left: 0;
    bottom: -5px;
    background: linear-gradient(90deg, #f7d2f7, #e4c7ed);
    transition: 0.3s ease;
    border-radius: 10px;
}

.navbar a:hover::after {
    width: 100%;
}

/* MAIN CARD (PROFILE STYLE) */
.card {
    max-width: 1200px;
    margin: 50px auto;
    background-color: #E4C7ED;
    border-radius: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    padding: 50px;
}

/* HEADER */
.card-header {
    text-align: center;
    font-size: 42px;
    font-weight: bold;
    margin-bottom: 40px;
    background-color: #F7D2F7;
    border-radius: 30px;
    padding: 15px;
}

/* LAYOUT (PROFILE STYLE FLEX) */
.top-section {
    display: flex;
    justify-content: center;
    gap: 50px;
    flex-wrap: wrap;
    align-items: flex-start;
}

/* LEFT ACTIVITIES */
.activity-box {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* ACTIVITY CARDS */
.card-item {
    width: 300px;
    background: #FEEBE7;
    border-radius: 20px;
    padding: 25px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    transition: 0.3s;
}

.card-item:hover {
    transform: translateY(-6px) scale(1.03);
    background-color: #F7D2F7;
}

/* RIGHT INFO BOX */
.info-box {
    width: 320px;
    background: #FEEBE7;
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* ================= SUBMIT FILE BOX (EXAM STYLE) ================= */

.submit-box {
    width: 320px;
    background: #FEEBE7;
    border-radius: 20px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.submit-box h2 {
    margin-bottom: 15px;
}

/* BUTTON STYLE (EXAM STYLE) */
#submitBtn {
    padding: 12px;
    width: 100%;
    background-color: #D99D54;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

#submitBtn:hover {
    background-color: pink;
}

#submitBtn:disabled {
    background-color: #ccc;
    cursor: not-allowed;
}

/* ================= MODAL ================= */

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
}

.modal-content {
    width: 450px;
    background: #FEEBE7;
    padding: 20px;
    border-radius: 15px;
    position: relative;
}

.close {
    position: absolute;
    right: 15px;
    top: 10px;
    font-size: 25px;
    cursor: pointer;
}

/* FORM INPUT */
input, select {
    width: 90%;
    padding: 8px;
    margin: 5px 0;
}

/* REGISTER BUTTON (UNCHANGED) */
button[type="submit"] {
    padding: 10px;
    width: 48%;
    background-color: #D99D54;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button[type="reset"] {
    padding: 10px;
    width: 48%;
    background-color: #D99D54;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.success {
    color: green;
    display: none;
}

/* IMAGE */
img {
    width: 100%;
    border-radius: 10px;
}
.back-container {
    text-align: center;
    margin-top: 40px;
}
.back {
    display: inline-block;
    margin-top: 50px;
    padding: 12px 25px;
    background-color: #FEEBE7;
    border: 2px solid #E4C7ED;
    border-radius: 25px;
    font-size: 20px;
    text-decoration: none;
    color: black;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    transition: 0.3s ease;
}

.back:hover {
    background-color: #F7D2F7;
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

.back-container {
    text-align: center;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <a href="Activities.html">Activities</a>
    <a href="Quizzes.html">Quizzes</a>
    <a href="Examinations.html">Examinations</a>
    <a href="index.html">Profile</a>
</div>

<!-- MAIN CARD -->
<div class="card">

    <div class="card-header">📚 Activities</div>

    <div class="top-section">

        <!-- LEFT -->
        <div class="activity-box">

            <div class="card-item" onclick="openActivity1()">
                Activity 1<br><small>HTML Structure</small>
            </div>

            <div class="card-item" onclick="openForm()">
                Activity 2<br><small>Registration Form</small>
            </div>

        </div>

        <!-- RIGHT INFO -->
        <div class="info-box">
            <h2>📌 Activities</h2>
            <p>Click each activity to view output or open form.</p>
        </div>

        <!-- ✅ SUBMIT FILE (EXAM STYLE) -->
        <div class="submit-box">
            <h2>Submit File</h2>
            <input type="file" id="fileUpload">
            <button id="submitBtn" disabled onclick="submitFile()">Submit</button>
        </div>

    </div>

</div>

<!-- POPUP 1 -->
<div class="modal" id="modal1">
    <div class="modal-content">
        <span class="close" onclick="closeActivity1()">✖</span>
        <h2>Activity 1 Output</h2>
        <img src="activity1.jpg">
    </div>
</div>

<!-- POPUP 2 -->
<div class="modal" id="modal2">
    <div class="modal-content">
        <span class="close" onclick="closeForm()">✖</span>

        <h2>Registration Form</h2>

        <form id="form">
            <input type="text" required>
            <input type="email" required>
            <input type="password" id="pass">
            <input type="password" id="cpass">

            <p id="msg"></p>

            <select>
                <option>Philippines</option>
                <option>USA</option>
            </select>

            <input type="checkbox" id="terms"> I agree<br><br>

            <button type="submit">Register</button>
            <button type="reset">Clear</button>

            <p class="success" id="ok">Success!</p>
        </form>

    </div>
</div>

<!-- BACK -->
<div class="back-container">
    <a class="back" href="index.html">← Back</a>
</div>

<script>

/* POPUPS */
function openActivity1(){ document.getElementById("modal1").style.display="flex"; }
function closeActivity1(){ document.getElementById("modal1").style.display="none"; }

function openForm(){ document.getElementById("modal2").style.display="flex"; }
function closeForm(){ document.getElementById("modal2").style.display="none"; }

/* FILE SUBMIT */
document.getElementById("fileUpload").addEventListener("change", function(){
    document.getElementById("submitBtn").disabled = this.files.length === 0;
});

function submitFile(){
    alert("File submitted!");
}

/* PASSWORD CHECK */
let pass = document.getElementById("pass");
let cpass = document.getElementById("cpass");
let msg = document.getElementById("msg");

document.addEventListener("input", function () {
    if (pass.value === cpass.value) {
        msg.innerHTML = "Passwords match";
        msg.style.color = "green";
    } else {
        msg.innerHTML = "Passwords not match";
        msg.style.color = "red";
    }
});

</script>

</body>
</html>
