<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Activities</title>

<style>

body {
    margin: 0;
    font-family: "Times New Roman", Times, serif;
    background-image: url('background.jpg');
    background-size: cover;
}

/* NAVBAR */
.navbar {
    background: rgba(254, 235, 231, 0.75);
    backdrop-filter: blur(10px);
    padding: 15px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    position: sticky;
    top: 0;
}

.navbar a {
    text-decoration: none;
    color: black;
    font-weight: bold;
    margin: 0 25px;
    font-size: 28px;
}

/* MAIN CARD */
.card {
    max-width: 1200px;
    margin: 50px auto;
    background-color: #E4C7ED;
    border-radius: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    padding: 50px;
}

/* HEADER */
.card-header {
    text-align: center;
    font-size: 42px;
    font-weight: bold;
    margin-bottom: 40px;
    background-color: #F7D2F7;
    border-radius: 30px;
    padding: 15px;
}

/* LAYOUT */
.top-section {
    display: flex;
    justify-content: center;
    gap: 50px;
    flex-wrap: wrap;
    align-items: flex-start;
}

/* LEFT SIDE */
.activity-box {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* ACTIVITY CARDS */
.card-item {
    width: 300px;
    background: #FEEBE7;
    border-radius: 20px;
    padding: 25px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    transition: 0.3s;
}

.card-item:hover {
    transform: translateY(-6px) scale(1.03);
    background-color: #F7D2F7;
}

/* RIGHT BOX */
.info-box {
    width: 320px;
    background: #FEEBE7;
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* ================= POPUPS (UNCHANGED) ================= */

.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
}

.modal-content {
    width: 450px;
    background: #FEEBE7;
    padding: 20px;
    border-radius: 15px;
    position: relative;
}

.close {
    position: absolute;
    right: 15px;
    top: 10px;
    font-size: 25px;
    cursor: pointer;
}

img {
    width: 100%;
    border-radius: 10px;
}

/* FORM INPUT */
input, select {
    width: 90%;
    padding: 8px;
    margin: 5px 0;
}

/* REGISTER BUTTON (UNCHANGED) */
button[type="submit"] {
    padding: 12px;
    width: 48%;
    background: linear-gradient(135deg, #F7D2F7, #E4C7ED);
    border: none;
    border-radius: 15px;
    cursor: pointer;
}

/* CLEAR BUTTON */
button[type="reset"] {
    padding: 10px;
    width: 48%;
    background-color: #D99D54;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* ================= ADDED FILE SUBMIT (ACTIVITY STYLE) ================= */

.file-submit-box {
    width: 300px;
    background: #FEEBE7;
    border-radius: 20px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

.file-submit-box h2 {
    margin-bottom: 15px;
}

/* ACTIVITY STYLE BUTTON */
#submitBtn {
    padding: 10px;
    width: 100%;
    background-color: #D99D54;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

#submitBtn:hover {
    background-color: pink;
}

#submitBtn:disabled {
    background-color: #ccc;
    cursor: not-allowed;
}

/* BACK */
.back-container {
    text-align: center;
}

.back {
    display: inline-block;
    margin-top: 50px;
    padding: 12px 25px;
    background-color: #FEEBE7;
    border: 2px solid #E4C7ED;
    border-radius: 25px;
    font-size: 20px;
    text-decoration: none;
    color: black;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
}

.back:hover {
    background-color: #F7D2F7;
    transform: translateY(-5px);
}

</style>
</head>

<body>

<div class="navbar">
    <a href="Activities.html">Activities</a>
    <a href="Quizzes.html">Quizzes</a>
    <a href="Examinations.html">Examinations</a>
    <a href="MyPortfolio.html">Profile</a>
</div>

<div class="card">

    <div class="card-header">📚 Activities</div>

    <div class="top-section">

        <!-- LEFT -->
        <div class="activity-box">

            <div class="card-item" onclick="openActivity1()">
                Activity 1<br><small>Carousel</small>
            </div>

            <div class="card-item" onclick="openForm()">
                Activity 2<br><small>Registration Form</small>
            </div>

        </div>

        <!-- RIGHT -->
        <div class="info-box">
            <h2>📌 Activities</h2>
            <p>Click each activity to view output or open the form.</p>
        </div>

        <!-- ✅ ADDED FILE SUBMIT BOX -->
        <div class="file-submit-box">
            <h2>Submit File</h2>
            <input type="file" id="fileUpload">
            <button id="submitBtn" disabled onclick="submitFile()">Submit</button>
        </div>

    </div>

</div>

<!-- POPUP 1 -->
<div class="modal" id="modal1">
    <div class="modal-content">
        <span class="close" onclick="closeActivity1()">✖</span>
        <h2>Activity 1 Output</h2>
        <img src="activity1.jpg">
    </div>
</div>

<!-- POPUP 2 -->
<div class="modal" id="modal2">
    <div class="modal-content">
        <span class="close" onclick="closeForm()">✖</span>

        <h2>Registration Form</h2>

        <form id="form">
            <input type="text" placeholder="Full Name" required><br>
            <input type="email" placeholder="Email" required><br>

            <input type="password" id="pass"><br>
            <input type="password" id="cpass"><br>

            <p id="msg"></p>

            <select>
                <option>Philippines</option>
                <option>USA</option>
            </select><br><br>

            <input type="checkbox" id="terms"> I agree<br><br>

            <button type="submit">Register</button>
            <button type="reset">Clear</button>

            <p class="success" id="ok">Success!</p>
        </form>

    </div>
</div>

<div class="back-container">
    <a class="back" href="MyPortfolio.html">← Back</a>
</div>

<script>

function openActivity1(){
    document.getElementById("modal1").style.display="flex";
}

function closeActivity1(){
    document.getElementById("modal1").style.display="none";
}

function openForm(){
    document.getElementById("modal2").style.display="flex";
}

function closeForm(){
    document.getElementById("modal2").style.display="none";
}

/* file submit */
document.getElementById("fileUpload").addEventListener("change", function(){
    document.getElementById("submitBtn").disabled = this.files.length === 0;
});

function submitFile(){
    alert("File submitted!");
}

</script>

</body>
</html>
